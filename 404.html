<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found | Game Arcade</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a1a; color: #e0e0e0;
            text-align: center; padding: 2rem;
        }

        .container {
            max-width: 520px;
            display: flex; flex-direction: column;
            align-items: center; gap: 1.5rem;
        }

        /* Inline SVG illustration */
        .illustration { width: min(80vw, 320px); height: auto; }

        .code {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 900; letter-spacing: 0.05em;
            background: linear-gradient(135deg, #7c4dff, #ff4081);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700; color: #ccc;
        }

        p { font-size: clamp(0.9rem, 2.5vw, 1.05rem); color: #888; max-width: 400px; line-height: 1.5; }

        .home-btn {
            display: inline-block; padding: 0.7rem 2rem;
            font-size: 1rem; font-weight: 600;
            border: 2px solid #7c4dff; border-radius: 10px;
            background: transparent; color: #e0e0e0;
            text-decoration: none; cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .home-btn:hover { background: #7c4dff33; transform: scale(1.05); }
        .home-btn:active { transform: scale(0.97); }

        /* Ghost animation */
        .ghost { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-12px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Inline SVG: ghost with game controller -->
        <svg class="illustration ghost" viewBox="0 0 300 260" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Ghost body -->
            <path d="M80 200 C80 120 100 60 150 60 C200 60 220 120 220 200 L220 230 L200 215 L180 230 L160 215 L140 230 L120 215 L100 230 L80 215 Z" fill="#7c4dff" opacity="0.85"/>
            <!-- Ghost face -->
            <circle cx="125" cy="130" r="10" fill="#fff"/>
            <circle cx="175" cy="130" r="10" fill="#fff"/>
            <circle cx="128" cy="132" r="5" fill="#0a0a1a"/>
            <circle cx="178" cy="132" r="5" fill="#0a0a1a"/>
            <ellipse cx="150" cy="160" rx="12" ry="8" fill="#0a0a1a" opacity="0.5"/>
            <!-- Controller held by ghost -->
            <rect x="115" y="175" rx="8" ry="8" width="70" height="30" fill="#ff4081" opacity="0.9"/>
            <circle cx="132" cy="190" r="5" fill="#fff" opacity="0.8"/>
            <circle cx="168" cy="190" r="5" fill="#fff" opacity="0.8"/>
            <rect x="145" y="182" width="10" height="4" rx="2" fill="#fff" opacity="0.5"/>
            <rect x="145" y="189" width="10" height="4" rx="2" fill="#fff" opacity="0.5"/>
            <!-- Stars (lost in space) -->
            <circle cx="40" cy="50" r="2.5" fill="#ffeb3b" opacity="0.7"/>
            <circle cx="260" cy="80" r="2" fill="#00e5ff" opacity="0.6"/>
            <circle cx="55" cy="180" r="1.5" fill="#ff4081" opacity="0.5"/>
            <circle cx="250" cy="200" r="2" fill="#7c4dff" opacity="0.6"/>
            <circle cx="30" cy="120" r="1.5" fill="#fff" opacity="0.4"/>
            <circle cx="275" cy="140" r="1.5" fill="#ffeb3b" opacity="0.5"/>
            <circle cx="270" cy="40" r="3" fill="#fff" opacity="0.3"/>
            <circle cx="20" cy="220" r="2" fill="#00e5ff" opacity="0.4"/>
        </svg>

        <div class="code">404</div>
        <h1>Oops! This level doesn't exist.</h1>
        <p>The page you're looking for got lost in the arcade. It may have been moved, deleted, or never existed.</p>
        <a href="/" class="home-btn">🏠 Back to Arcade</a>
    </div>
</body>
</html>
